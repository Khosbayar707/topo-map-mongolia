<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Топографийн зураг</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    header {
      background: #16213e; border-bottom: 2px solid #0f3460;
      padding: 8px 14px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.5); z-index: 1000;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: #e94560; white-space: nowrap; }
    .subtitle { font-size: 0.68rem; color: #7a8a9a; white-space: nowrap; }
    .hcontrols { display: flex; gap: 6px; margin-left: auto; align-items: center; flex-shrink: 0; }
    .btn {
      background: #0f3460; border: 1px solid #e94560; color: #e0e0e0;
      padding: 5px 11px; border-radius: 4px; cursor: pointer; font-size: 0.76rem;
      transition: background .15s; white-space: nowrap; user-select: none;
    }
    .btn:hover { background: #e94560; }
    .btn.active { background: #e94560; }

    /* ── Main layout ── */
    #main-wrap { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }
    #map-wrap  { position: relative; flex: 1; overflow: hidden; }
    #map       { width: 100%; height: 100%; }

    /* ── Status bar ── */
    #statusbar {
      background: #0f1a30; border-top: 1px solid #0f3460;
      display: flex; align-items: center;
      height: 26px; flex-shrink: 0; font-size: 0.68rem; overflow: hidden;
    }
    .sb-item {
      padding: 0 10px; border-right: 1px solid #1a3060;
      display: flex; align-items: center; gap: 5px; height: 100%;
      white-space: nowrap; color: #8a9ab0;
    }
    .sb-item b { color: #c0d0e0; font-weight: 600; }
    .sb-item.wide { flex: 1; min-width: 0; overflow: hidden; }
    .sb-dot { width: 6px; height: 6px; border-radius: 50%; background: #e94560; flex-shrink: 0; }

    /* ── Layer panel (desktop: right sidebar) ── */
    #layer-panel {
      width: 265px; background: #12192e; border-left: 1px solid #1a3060;
      display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
      transition: width .25s ease; flex-shrink: 0; z-index: 100;
    }
    #layer-panel.collapsed { width: 0; border: none; overflow: hidden; }

    .panel-title {
      padding: 10px 14px 9px; font-size: 0.8rem; color: #e94560; font-weight: 700;
      border-bottom: 1px solid #1a3060; background: #12192e;
      position: sticky; top: 0; z-index: 10; white-space: nowrap; letter-spacing: .3px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-close-btn {
      display: none; background: none; border: none; color: #7a8a9a;
      font-size: 1.1rem; cursor: pointer; padding: 0 2px; line-height: 1;
    }

    .lsection { border-bottom: 1px solid #0a2040; padding-bottom: 8px; }
    .lsection-head {
      padding: 8px 14px 5px; font-size: 0.68rem; color: #7a8a9a;
      text-transform: uppercase; letter-spacing: .6px; white-space: nowrap;
    }

    /* Base map grid */
    .basemap-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 10px 4px; }
    .basemap-card {
      cursor: pointer; border-radius: 6px; overflow: hidden;
      border: 2px solid transparent; transition: border-color .15s; background: #0a2040;
    }
    .basemap-card.active { border-color: #e94560; }
    .basemap-card:hover:not(.active) { border-color: #4a6a9a; }
    .basemap-thumb { width: 100%; height: 48px; display: block; }
    .thumb-dark     { background: linear-gradient(135deg,#1a1a2e,#0f3460); }
    .thumb-osm      { background: linear-gradient(135deg,#b5d0a8,#e8e0c0); }
    .thumb-satellite{ background: linear-gradient(135deg,#1a3a1a,#2a5a2a,#1a2a40); }
    .thumb-topo     { background: linear-gradient(135deg,#c8b87a,#a8905a,#d0c890); }
    .thumb-light    { background: linear-gradient(135deg,#f5f5f0,#e8e8e0); }
    .thumb-terrain  { background: linear-gradient(135deg,#8fbc8f,#6b9b6b,#a0c8a0); }
    .basemap-label {
      font-size: 0.63rem; text-align: center; padding: 3px 2px;
      color: #b0c0d0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .base-row { padding: 5px 14px; display: flex; align-items: center; gap: 8px; }
    .base-row input[type=checkbox] { accent-color: #e94560; cursor: pointer; flex-shrink: 0; }
    .base-row label { font-size: 0.78rem; cursor: pointer; flex: 1; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.15); }
    .slider-row { padding: 2px 14px 6px; display: flex; align-items: center; gap: 8px; }
    .slider-row span { font-size: 0.66rem; color: #7a8a9a; width: 26px; text-align: right; flex-shrink: 0; }
    .slider-row input[type=range] { flex: 1; accent-color: #e94560; cursor: pointer; }

    /* Shapefile cards */
    .shp-card { border-bottom: 1px solid #0a2040; }
    .shp-card-head { padding: 7px 14px 5px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .shp-card-head:hover { background: rgba(255,255,255,.04); }
    .shp-card-head input[type=checkbox] { accent-color: #e94560; cursor: pointer; flex-shrink: 0; }
    .shp-name { font-size: 0.8rem; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shp-toggle { font-size: 0.7rem; color: #7a8a9a; flex-shrink: 0; transition: transform .2s; }
    .shp-toggle.open { transform: rotate(180deg); }
    .shp-style { padding: 0 14px 10px; display: none; }
    .shp-style.open { display: block; }
    .style-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .style-label { font-size: 0.68rem; color: #7a8a9a; width: 72px; flex-shrink: 0; }
    .style-row input[type=color] { width: 34px; height: 22px; border: 1px solid #0f3460; border-radius: 3px; background: none; cursor: pointer; padding: 1px; }
    .style-row input[type=range] { flex: 1; accent-color: #e94560; cursor: pointer; }
    .style-row .val { font-size: 0.68rem; color: #a0b0c0; width: 28px; text-align: right; flex-shrink: 0; }
    .style-row select { flex: 1; background: #0f3460; border: 1px solid #1a4080; color: #e0e0e0; border-radius: 3px; padding: 2px 4px; font-size: 0.7rem; cursor: pointer; }
    .shp-status { font-size: 0.68rem; color: #7a8a9a; padding: 4px 14px 6px; }
    .shp-status.err { color: #e94560; }
    .no-layers { padding: 10px 14px; font-size: 0.75rem; color: #7a8a9a; }

    /* Leaflet overrides */
    .leaflet-top.leaflet-left { top: 10px; left: 10px; }
    .leaflet-popup-content-wrapper { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 6px; }
    .leaflet-popup-tip { background: #16213e; }
    .leaflet-popup-content { font-size: 0.76rem; margin: 10px 14px; }
    .popup-title { color: #e94560; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
    .popup-row { display: flex; gap: 6px; margin: 2px 0; }
    .popup-key { color: #7a8a9a; min-width: 70px; }

    /* Loading */
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(26,26,46,.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
    }
    .spinner { width: 46px; height: 46px; border: 4px solid #0f3460; border-top-color: #e94560;
      border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile overlay backdrop ── */
    #panel-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 399;
    }

    /* ── Floating mobile toggle button ── */
    #fab-layers {
      display: none;
      position: fixed; bottom: 60px; right: 16px; z-index: 600;
      width: 50px; height: 50px; border-radius: 50%;
      background: #e94560; border: none; color: #fff;
      font-size: 1.3rem; cursor: pointer; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.5); transition: transform .15s;
    }
    #fab-layers:active { transform: scale(.92); }

    /* ── Mobile responsive (≤ 768px) ── */
    @media (max-width: 768px) {
      /* Compact header */
      header { padding: 6px 10px; }
      header h1 { font-size: 0.88rem; }
      .subtitle { display: none; }
      .btn { padding: 5px 9px; font-size: 0.72rem; }
      /* Hide desktop layers button — FAB replaces it */
      #btn-layers { display: none; }

      /* Status bar: show only zoom + position */
      #sb-size, #sb-bbox { display: none !important; }
      #statusbar { height: 24px; font-size: 0.65rem; }
      .sb-item { padding: 0 8px; }

      /* Panel becomes bottom drawer */
      #layer-panel {
        position: fixed !important;
        bottom: 0; left: 0; right: 0;
        width: 100% !important;
        height: 68vh;
        max-height: 85vh;
        border-left: none !important;
        border-top: 2px solid #e94560;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        transition: transform .3s cubic-bezier(.25,.8,.25,1);
        overflow-y: auto;
        z-index: 400;
      }
      #layer-panel.mobile-open {
        transform: translateY(0);
      }
      /* collapsed class does nothing on mobile — use mobile-open instead */
      #layer-panel.collapsed { width: 100% !important; overflow: auto; }

      /* Show close button inside panel */
      .panel-close-btn { display: block; }

      /* Drawer handle at top */
      .panel-title::before {
        content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
        width: 36px; height: 4px; border-radius: 2px; background: #2a4a6a;
      }
      .panel-title { position: relative; padding-top: 16px; }

      /* FAB visible */
      #fab-layers { display: flex; }

      /* Backdrop visible when panel open */
      #panel-backdrop.visible { display: block; }

      /* Larger touch targets */
      .shp-card-head { padding: 10px 14px; }
      .basemap-card .basemap-thumb { height: 44px; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 0.8rem; }
      .btn { padding: 4px 7px; font-size: 0.69rem; }
      #layer-panel { height: 72vh; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Топографийн зураг</h1>
    <div class="subtitle">1:200,000 масштаб • Монгол улс</div>
  </div>
  <div class="hcontrols">
    <button class="btn active" id="btn-topo">Топо</button>
    <button class="btn" id="btn-fit">Бүтэн</button>
    <button class="btn" id="btn-layers">☰ Давхаргууд</button>
    <a class="btn" href="/upload" style="text-decoration:none;font-size:0.7rem;opacity:0.55">🔒</a>
  </div>
</header>

<div id="main-wrap">
  <div id="map-wrap">
    <div id="map"></div>
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div style="font-size:.85rem">Зургийг ачааллаж байна...</div>
    </div>
  </div>

  <div id="layer-panel">
    <div class="panel-title">
      ☰ Давхаргууд
      <button class="panel-close-btn" id="btn-panel-close" title="Хаах">✕</button>
    </div>

    <div class="lsection">
      <div class="lsection-head">Суурь газрын зураг</div>
      <div class="basemap-grid" id="basemap-grid">
        <div class="basemap-card active" data-id="dark">
          <div class="basemap-thumb thumb-dark"></div>
          <div class="basemap-label">Харанхуй</div>
        </div>
        <div class="basemap-card" data-id="osm">
          <div class="basemap-thumb thumb-osm"></div>
          <div class="basemap-label">OpenStreetMap</div>
        </div>
        <div class="basemap-card" data-id="satellite">
          <div class="basemap-thumb thumb-satellite"></div>
          <div class="basemap-label">Хиймэл дагуул</div>
        </div>
        <div class="basemap-card" data-id="topo">
          <div class="basemap-thumb thumb-topo"></div>
          <div class="basemap-label">OpenTopoMap</div>
        </div>
        <div class="basemap-card" data-id="light">
          <div class="basemap-thumb thumb-light"></div>
          <div class="basemap-label">Цайвар</div>
        </div>
        <div class="basemap-card" data-id="terrain">
          <div class="basemap-thumb thumb-terrain"></div>
          <div class="basemap-label">Гадарга</div>
        </div>
      </div>
      <div class="slider-row" style="padding-top:6px">
        <span id="base-op-val">30</span>
        <input type="range" id="opacity-base" min="0" max="100" value="30" />
      </div>
    </div>

    <div class="lsection">
      <div class="lsection-head">Топографийн зураг (overlay)</div>
      <div class="base-row">
        <input type="checkbox" id="chk-topo" checked />
        <div class="swatch" style="background:#c8a86b"></div>
        <label for="chk-topo">Топографийн зураг 1:200,000</label>
      </div>
      <div class="slider-row">
        <span id="topo-op-val">100</span>
        <input type="range" id="opacity-topo" min="0" max="100" value="100" />
      </div>
    </div>

    <div class="lsection">
      <div class="lsection-head">Shapefile давхаргууд</div>
      <div id="shp-list"></div>
    </div>
  </div>
</div>

<!-- Mobile backdrop -->
<div id="panel-backdrop"></div>

<!-- Mobile FAB -->
<button id="fab-layers" title="Давхаргууд">☰</button>

<div id="statusbar">
  <div class="sb-item"><div class="sb-dot"></div>Zoom <b id="sb-zoom">—</b></div>
  <div class="sb-item wide">📍 <b id="sb-pos">—</b></div>
  <div class="sb-item" id="sb-size" style="display:none">🗂 <b id="sb-imgsize">—</b></div>
  <div class="sb-item" id="sb-bbox" style="display:none"><b id="sb-bboxval">—</b></div>
</div>

<script>
const R2 = 'https://pub-2d7bdb113e09406eab77dc06705c4461.r2.dev';

const BASEMAPS = {
  dark:      { url: 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', opts: { subdomains:'abcd', maxZoom:20, attribution:'© CARTO' } },
  osm:       { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',                 opts: { subdomains:'abc',  maxZoom:19, attribution:'© OpenStreetMap' } },
  satellite: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', opts: { maxZoom:19, attribution:'© Esri' } },
  topo:      { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',                   opts: { subdomains:'abc', maxZoom:17, attribution:'© OpenTopoMap' } },
  light:     { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',     opts: { subdomains:'abcd', maxZoom:20, attribution:'© CARTO' } },
  terrain:   { url: 'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png', opts: { maxZoom:18, attribution:'© Stadia Maps' } },
};

// ── Map ───────────────────────────────────────────────────────────────
const map = L.map('map', { center:[47,104], zoom:6, minZoom:6, maxZoom:11, zoomControl:true });

let currentBaseId = 'dark';
let currentBaseLayer = L.tileLayer(BASEMAPS.dark.url, { ...BASEMAPS.dark.opts, opacity:0.3 }).addTo(map);

const topoLayer = L.tileLayer(`${R2}/tiles/{z}/{x}/{y}.png`, {
  attribution: 'Топографийн зураг 1:200,000',
  maxNativeZoom: 11, maxZoom: 11, opacity: 1.0, tms: true,
  errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'
}).addTo(map);

// ── Panel toggle (desktop + mobile) ──────────────────────────────────
const panel    = document.getElementById('layer-panel');
const backdrop = document.getElementById('panel-backdrop');
const isMobile = () => window.innerWidth <= 768;

function openPanel() {
  if (isMobile()) {
    panel.classList.add('mobile-open');
    backdrop.classList.add('visible');
  } else {
    panel.classList.remove('collapsed');
  }
}
function closePanel() {
  if (isMobile()) {
    panel.classList.remove('mobile-open');
    backdrop.classList.remove('visible');
  } else {
    panel.classList.add('collapsed');
  }
}
function togglePanel() {
  if (isMobile()) {
    panel.classList.contains('mobile-open') ? closePanel() : openPanel();
  } else {
    panel.classList.toggle('collapsed');
  }
}

document.getElementById('btn-layers').addEventListener('click', togglePanel);
document.getElementById('fab-layers').addEventListener('click', openPanel);
document.getElementById('btn-panel-close').addEventListener('click', closePanel);
backdrop.addEventListener('click', closePanel);

// Touch swipe-down to close drawer
let touchStartY = 0;
panel.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
panel.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 60) closePanel();
}, { passive: true });

// ── Base map switcher ─────────────────────────────────────────────────
function switchBase(id) {
  if (id === currentBaseId) return;
  const opacity = document.getElementById('opacity-base').value / 100;
  map.removeLayer(currentBaseLayer);
  currentBaseLayer = L.tileLayer(BASEMAPS[id].url, { ...BASEMAPS[id].opts, opacity }).addTo(map);
  topoLayer.bringToFront();
  currentBaseId = id;
  document.querySelectorAll('.basemap-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
}
document.getElementById('basemap-grid').addEventListener('click', e => {
  const card = e.target.closest('.basemap-card');
  if (card) switchBase(card.dataset.id);
});
document.getElementById('opacity-base').addEventListener('input', e => {
  currentBaseLayer.setOpacity(e.target.value / 100);
  document.getElementById('base-op-val').textContent = e.target.value;
});

// ── Topo overlay ──────────────────────────────────────────────────────
document.getElementById('chk-topo').addEventListener('change', e => {
  e.target.checked ? map.addLayer(topoLayer) : map.removeLayer(topoLayer);
  document.getElementById('btn-topo').classList.toggle('active', e.target.checked);
});
document.getElementById('opacity-topo').addEventListener('input', e => {
  topoLayer.setOpacity(e.target.value / 100);
  document.getElementById('topo-op-val').textContent = e.target.value;
});
document.getElementById('btn-topo').addEventListener('click', () => {
  const c = document.getElementById('chk-topo'); c.checked = !c.checked; c.dispatchEvent(new Event('change'));
});

// ── Fit bounds ────────────────────────────────────────────────────────
const INFO = { west:87.712, south:41.333, east:120.000, north:52.000, width:322880, height:106669 };
document.getElementById('btn-fit').addEventListener('click', () => {
  map.fitBounds([[INFO.south, INFO.west],[INFO.north, INFO.east]], { maxZoom:8, animate:false, padding:[10,10] });
});

// ── Popup ─────────────────────────────────────────────────────────────
const COLORS = ['#e94560','#00d4ff','#39d98a','#ffb800','#b47fff','#ff6b35','#00e5c0','#ff4dff'];

function makePopup(feature, layerName) {
  const p = feature.properties || {};
  const title = p.NAME || p.name || p.ADM1_MN || p.ADM1_EN || p.ADM2_MN || p.ADM2_EN || layerName;
  const skip = new Set(['FID','fid','OBJECTID','objectid','Shape_Area','Shape_Leng']);
  const rows = Object.entries(p)
    .filter(([k,v]) => !skip.has(k) && v !== null && v !== '')
    .map(([k,v]) => `<div class="popup-row"><span class="popup-key">${k}</span><span>${v}</span></div>`)
    .join('');
  return `<div class="popup-title">${title}</div>${rows || '<em style="color:#7a8a9a">Мэдээлэл алга</em>'}`;
}

function buildLeafletLayer(geojson, style, layerName) {
  return L.geoJSON(geojson, {
    style: () => ({
      color: style.strokeColor, weight: style.strokeWidth,
      opacity: style.strokeOpacity / 100,
      fillColor: style.fillColor, fillOpacity: style.fillOpacity / 100,
      dashArray: style.dash === 'solid' ? null : style.dash === 'dash' ? '8,4' : style.dash === 'dot' ? '2,4' : '8,2,2,2'
    }),
    pointToLayer: (_, ll) => L.circleMarker(ll, {
      radius: style.strokeWidth * 2 + 2,
      color: style.strokeColor, weight: style.strokeWidth,
      fillColor: style.fillColor, fillOpacity: style.fillOpacity / 100
    }),
    onEachFeature: (feature, layer) => {
      layer.bindPopup(() => makePopup(feature, layerName), { maxWidth:280, maxHeight:220 });
    }
  });
}

// ── Shapefile layers ──────────────────────────────────────────────────
let _shpLeafletLayers = [];

async function loadShapefileLayers() {
  const list = document.getElementById('shp-list');
  _shpLeafletLayers.forEach(l => { try { map.removeLayer(l); } catch {} });
  _shpLeafletLayers = [];

  let layers;
  try {
    layers = await fetch(`${R2}/geojson/layers.json?t=${Date.now()}`).then(r => r.json());
  } catch {
    list.innerHTML = '<div class="no-layers">Давхарга татаж чадсангүй</div>';
    return;
  }
  if (!layers.length) { list.innerHTML = '<div class="no-layers">Shapefile давхарга алга</div>'; return; }
  list.innerHTML = '';

  layers.forEach(({ name, file, ready }, idx) => {
    const id    = `shp${idx}`;
    const color = COLORS[idx % COLORS.length];
    const style = { strokeColor: color, strokeWidth: 2, strokeOpacity: 90, fillColor: color, fillOpacity: 15, dash: 'solid' };

    const card = document.createElement('div');
    card.className = 'shp-card';
    card.innerHTML = `
      <div class="shp-card-head" id="head-${id}">
        <input type="checkbox" id="chk-${id}" ${ready ? 'checked' : 'disabled'} />
        <div class="swatch" id="swatch-${id}" style="background:${color}"></div>
        <span class="shp-name" title="${name}">${name}</span>
        <span class="shp-toggle" id="toggle-${id}">▼</span>
      </div>
      <div class="shp-style" id="style-${id}">
        <div class="style-row">
          <span class="style-label">Шугамын өнгө</span>
          <input type="color" id="${id}-sc" value="${color}" />
          <span class="style-label" style="width:auto;margin-left:8px">Дүүргэх өнгө</span>
          <input type="color" id="${id}-fc" value="${color}" />
        </div>
        <div class="style-row">
          <span class="style-label">Шугамын зузаан</span>
          <input type="range" id="${id}-sw" min="0.5" max="8" step="0.5" value="2" />
          <span class="val" id="${id}-sw-v">2</span>
        </div>
        <div class="style-row">
          <span class="style-label">Шугамын тунгалаг</span>
          <input type="range" id="${id}-so" min="0" max="100" value="90" />
          <span class="val" id="${id}-so-v">90%</span>
        </div>
        <div class="style-row">
          <span class="style-label">Дүүргэлтийн тунгалаг</span>
          <input type="range" id="${id}-fo" min="0" max="100" value="15" />
          <span class="val" id="${id}-fo-v">15%</span>
        </div>
        <div class="style-row">
          <span class="style-label">Шугамын хэлбэр</span>
          <select id="${id}-dash">
            <option value="solid">Суцал шугам</option>
            <option value="dash">Тасархай шугам</option>
            <option value="dot">Цэгэн шугам</option>
            <option value="dashdot">Тасархай-цэгэн</option>
          </select>
        </div>
      </div>`;
    list.appendChild(card);
    if (!ready) return;

    let leafletLayer = null;

    function applyStyle() {
      if (!leafletLayer) return;
      leafletLayer.setStyle({
        color: style.strokeColor, weight: style.strokeWidth, opacity: style.strokeOpacity / 100,
        fillColor: style.fillColor, fillOpacity: style.fillOpacity / 100,
        dashArray: style.dash === 'solid' ? null : style.dash === 'dash' ? '8,4' : style.dash === 'dot' ? '2,4' : '8,2,2,2'
      });
      document.getElementById(`swatch-${id}`).style.background = style.strokeColor;
    }

    document.getElementById(`${id}-sc`).addEventListener('input', e => { style.strokeColor = e.target.value; applyStyle(); });
    document.getElementById(`${id}-fc`).addEventListener('input', e => { style.fillColor = e.target.value; applyStyle(); });
    document.getElementById(`${id}-sw`).addEventListener('input', e => { style.strokeWidth = parseFloat(e.target.value); document.getElementById(`${id}-sw-v`).textContent = e.target.value; applyStyle(); });
    document.getElementById(`${id}-so`).addEventListener('input', e => { style.strokeOpacity = parseInt(e.target.value); document.getElementById(`${id}-so-v`).textContent = e.target.value + '%'; applyStyle(); });
    document.getElementById(`${id}-fo`).addEventListener('input', e => { style.fillOpacity = parseInt(e.target.value); document.getElementById(`${id}-fo-v`).textContent = e.target.value + '%'; applyStyle(); });
    document.getElementById(`${id}-dash`).addEventListener('change', e => { style.dash = e.target.value; applyStyle(); });

    document.getElementById(`head-${id}`).addEventListener('click', e => {
      if (e.target.tagName === 'INPUT') return;
      document.getElementById(`style-${id}`).classList.toggle('open');
      document.getElementById(`toggle-${id}`).classList.toggle('open');
    });
    document.getElementById(`chk-${id}`).addEventListener('change', e => {
      if (e.target.checked) { if (leafletLayer) map.addLayer(leafletLayer); }
      else { if (leafletLayer) map.removeLayer(leafletLayer); }
    });

    const geoUrl = `${R2}/geojson/${encodeURIComponent(file || name + '.geojson')}`;
    fetch(geoUrl)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(geojson => {
        leafletLayer = buildLeafletLayer(geojson, style, name).addTo(map);
        _shpLeafletLayers.push(leafletLayer);
      })
      .catch(e => { card.insertAdjacentHTML('beforeend', `<div class="shp-status err">Уншиж чадсангүй (${e.message})</div>`); });
  });
}

// ── Map events ────────────────────────────────────────────────────────
map.on('mousemove', e => {
  document.getElementById('sb-pos').textContent = `${e.latlng.lat.toFixed(4)}°N  ${e.latlng.lng.toFixed(4)}°E`;
});
function updateZoom() { document.getElementById('sb-zoom').textContent = map.getZoom(); }
map.on('zoomend', updateZoom);
updateZoom();
L.control.scale({ imperial:false, position:'bottomleft' }).addTo(map);

// ── Init ──────────────────────────────────────────────────────────────
document.getElementById('sb-imgsize').textContent = `${INFO.width.toLocaleString()} × ${INFO.height.toLocaleString()} px`;
document.getElementById('sb-bboxval').textContent = `${INFO.west}°–${INFO.east}°E  ${INFO.south}°–${INFO.north}°N`;
document.getElementById('sb-size').style.display = '';
document.getElementById('sb-bbox').style.display = '';
document.getElementById('loading').style.display = 'none';
loadShapefileLayers();
</script>
</body>
</html>
